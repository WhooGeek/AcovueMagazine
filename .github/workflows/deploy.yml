name: Java CI/CD with Gradle

# 언제 실행할지
on:
  push:
    branches: [ "deploy/actions/#95" ] # 지금 작업 중인 브랜치에 푸시될 때 실행!
  pull_request:
    branches: [ "deploy/actions/#95" ]

jobs:
  # CI 빌드 작업
  build:
    runs-on: ubuntu-latest # 최신 엑션즈 리눅스 환경에서 실행

    steps:
      - uses: actions/checkout@v4 # 프젝 코드를 리눅스 환경으로 가져오기

      - name: Set up JDK 21 # 자바 21 실행
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle # 빌드 도구 Gradle 준비
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew # 실행 권한 가져오기

      - name: Build with Gradle # 빌드 + 테스트
        run: ./gradlew build