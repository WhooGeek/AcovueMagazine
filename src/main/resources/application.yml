spring:

# DB 설정

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

# JPA 설정

  jpa:
    hibernate:
      ddl-auto: update   # 개발 단계라면 update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

# 레디스 (Refresh Token 저장소) 설정

  data:
    redis:
      host: localhost
      port: 6379
      password: "" # 필요 없으면 공백
      jedis:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1


# 소셜 로그인 설정

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email

# JWT Token 설정

jwt:
  secret: ${JWT_SECRET_KEY}

# 로그 출력 설정

logging:
  level:
    org:
      springframework: info
      zerock: debug

