services:
  redis:
    image: redis:7.2
    container_name: redis-dev
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  app:
    image: whoowhoo/acovue-magazine:latest
    container_name: acovue-app
    ports:
      - "80:8080"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
